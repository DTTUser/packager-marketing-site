<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thanks, AI Learning Packager</title>
  <meta name="description" content="Thanks for signing up to the AI Learning Packager early access list.">
  <meta name="robots" content="noindex">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0e27'/%3E%3Ctext x='50' y='66' font-size='52' text-anchor='middle' fill='%2300d4aa' font-family='Helvetica,Arial' font-weight='800'%3EP%3C/text%3E%3C/svg%3E">

  <style>
    :root {
      --navy-deep: #0a0e27;
      --navy-mid: #151a3d;
      --teal: #00d4aa;
      --teal-deep: #00b894;
      --text-white: #f0f4ff;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, var(--navy-deep), var(--navy-mid));
      color: var(--text-white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      max-width: 520px;
      margin: 24px;
      padding: 48px 40px;
      background: rgba(26, 32, 80, 0.5);
      border: 1px solid #1e2650;
      border-radius: 20px;
      text-align: center;
    }

    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--teal);
      color: var(--navy-deep);
      font-size: 32px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 12px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--text-muted);
      margin: 0 0 24px;
      font-size: 16px;
    }

    a.btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 30px;
      background: var(--teal);
      color: var(--navy-deep);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
    }

    a.btn:hover {
      background: var(--teal-deep);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check" aria-hidden="true">&#10003;</div>
    <h1>You are on the list.</h1>
    <p>We will email you the live URL and a short tester brief within a day or two. Reply to that email with any questions, or to bow out gracefully.</p>
    <a class="btn" href="/">Back to the home page</a>
  </div>
</body>
</html>
